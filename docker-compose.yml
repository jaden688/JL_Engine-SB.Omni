services:
  sparkbyte:
    image: copilot-separate-leopard-sparkbyte:latest
    container_name: sparkbyte
    ports:
      - "8081:8081"
    volumes:
      - sparkbyte_runtime:/app/runtime
    restart: unless-stopped
    environment:
      SPARKBYTE_HOST: "0.0.0.0"
      SPARKBYTE_PORT: "8081"
      SPARKBYTE_LAUNCH_BROWSER: "0"
      SPARKBYTE_STATE_DIR: "/app/runtime"

volumes:
  sparkbyte_runtime:
